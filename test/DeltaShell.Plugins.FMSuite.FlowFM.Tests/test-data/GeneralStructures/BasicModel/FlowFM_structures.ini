[structure]
    type                  = generalstructure    # Type of structure
    id                    = weir01              # Name of the structure
    polylinefile          = weir01.pli          # *.pli; Polyline geometry definition for 2D structure
    widthleftW1           = 20.000              # Width left side of structure (m)
    widthleftWsdl         = 20.000              # Width structure left side (m)
    widthcenter           = 20.000              # Width structure centre (m)
    widthrightWsdr        = 20.000              # Width structure right side (m)
    widthrightW2          = 20.000              # Width right side of structure (m)
    levelleftZb1          = 5.000               # Bed level left side of structure (m AD)
    levelleftZbsl         = 5.000               # Bed level left side structure (m AD)
    levelcenter           = 6.000               # Bed level at centre of structure (m AD)
    levelrightZbsr        = 5.000               # Bed level right side structure (m AD)
    levelrightZb2         = 5.000               # Bed level right side of structure (m AD)
    gateheight            = 13.000              # Gate lower edge level (m AD)
    pos_freegateflowcoeff = 1.000               # Positive free gate flow (-)
    pos_drowngateflowcoeff= 1.000               # Positive drowned gate flow (-)
    pos_freeweirflowcoeff = 1.000               # Positive free weir flow (-)
    pos_drownweirflowcoeff= 1.000               # Positive drowned weir flow (-)
    pos_contrcoeffreegate = 1.000               # Positive flow contraction coefficient (-)
    neg_freegateflowcoeff = 1.000               # Negative free gate flow (-)
    neg_drowngateflowcoeff= 1.000               # Negative drowned gate flow (-)
    neg_freeweirflowcoeff = 1.000               # Negative free weir flow (-)
    neg_drownweirflowcoeff= 1.000               # Negative drowned weir flow (-)
    neg_contrcoeffreegate = 1.000               # Negative flow contraction coefficient (-)
    extraresistance       = 0.000               # Extra resistance (-)
    gatedoorheight        = 7.000               # Gate opening height (m)
