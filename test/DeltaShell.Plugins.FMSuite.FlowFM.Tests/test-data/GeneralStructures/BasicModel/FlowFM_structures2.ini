[structure]	
    type                  = generalstructure    # Type of structure
    id                    = banana              # Name of the structure
    polylinefile          = banana.pli          # *.pli; Polyline geometry definition for 2D structure
    widthleftW1           = 0.005               # Width left side of structure (m)
