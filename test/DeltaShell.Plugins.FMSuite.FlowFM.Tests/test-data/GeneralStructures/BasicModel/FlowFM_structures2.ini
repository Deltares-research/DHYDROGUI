    widthcenter           = 350                 # Width structure centre (m)
    widthrightWsdr        = 45                  # Width structure right side (m)
    widthrightW2          = 9.3                 # Width right side of structure (m)
    levelleftZb1          = 20                  # Bed level left side of structure (m AD)
    levelleftZbsl         = 1                   # Bed level left side structure (m AD)
    levelcenter           = 1                   # Bed level at centre of structure (m AD)
    levelrightZbsr        = -30                 # Bed level right side structure (m AD)
    levelrightZb2         = 40                  # Bed level right side of structure (m AD)
    gateheight            = 9                   # Gate lower edge level (m AD)
    pos_freegateflowcoeff = 1                   # Positive free gate flow (-)
    pos_drowngateflowcoeff= 1                   # Positive drowned gate flow (-)
    pos_freeweirflowcoeff = 1                   # Positive free weir flow (-)
    pos_drownweirflowcoeff= 1                   # Positive drowned weir flow (-)
    pos_contrcoeffreegate = 1                   # Positive flow contraction coefficient (-)
    neg_freegateflowcoeff = 1                   # Negative free gate flow (-)
    neg_drowngateflowcoeff= 1                   # Negative drowned gate flow (-)
    neg_freeweirflowcoeff = 1                   # Negative free weir flow (-)
    neg_drownweirflowcoeff= 1                   # Negative drowned weir flow (-)
    neg_contrcoeffreegate = 1                   # Negative flow contraction coefficient (-)
    extraresistance       = 6                   # Extra resistance (-)
    gatedoorheight        = 8                   # Vertical gate door height (m)
    door_opening_width    = 7                   # Horizontal opening width between the doors (m)
    horizontal_opening_direction= from_left           # Horizontal direction of the opening doors
