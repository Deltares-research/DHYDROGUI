[structure]
    type                  = pump                # Type of structure
    id                    = pump02              # Name of the structure
    polylinefile          = pump02.pli          # *.pli; Polyline geometry definition for 2D structure
    capacity              = 1                   # Pump capacity (in [m3/s])
[structure]
    type                  = weir                # Type of structure
    id                    = weir02              # Name of the structure
    polylinefile          = weir02.pli          # *.pli; Polyline geometry definition for 2D structure
    crest_level           = 1                   # Weir crest height (in [m])
    lat_contr_coeff       = 1                   # Lateral contraction coefficient
[structure]
    type                  = gate                # Type of structure
    id                    = gate02              # Name of the structure
    polylinefile          = gate02.pli          # *.pli; Polyline geometry definition for 2D structure
    sill_Level            = 1                   # Gate sill level (in [m])
    gateLowerEdgeLevel    = 0                   # Gate lower edge level (in [m])
    gateOpeningWidth      = 0                   # Gate opening width (in [m])
    gateHeight            = 0                   # Gate door height (in [m])
    gateOpeningHorizontalDirection= symmetric           # Horizontal direction of the opening doors
