[structure]
    type                  = pump                # Type of structure
    id                    = Pump 1              # Name of the structure
    polylinefile          = Pump 1.pli          # *.pli; Polyline geometry definition for 2D structure
    capacity              = 40                  # Pump capacity (in [m3/s])
[structure]
    type                  = weir                # Type of structure
    id                    = Weir 1              # Name of the structure
    polylinefile          = Weir 1.pli          # *.pli; Polyline geometry definition for 2D structure
    crest_level           = 0.5                 # Weir crest height (in [m])
    crest_width           = 5                   # Weir crest width (in [m])
    lat_contr_coeff       = 1                   # Lateral contraction coefficient
[structure]
    type                  = gate                # Type of structure
    id                    = Gate 1              # Name of the structure
    polylinefile          = Gate 1.pli          # *.pli; Polyline geometry definition for 2D structure
    sill_level            = 0                   # Gate sill level (in [m])
    lower_edge_level      = 0                   # Gate lower edge level (in [m])
    opening_width         = 200                 # Gate opening width (in [m])
    door_height           = 0                   # Gate door height (in [m])
    horizontal_opening_direction= symmetric           # Horizontal direction of the opening doors
