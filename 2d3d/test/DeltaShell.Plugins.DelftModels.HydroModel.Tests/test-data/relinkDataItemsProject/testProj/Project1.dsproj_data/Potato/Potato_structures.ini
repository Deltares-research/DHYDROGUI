[structure]
    type                  = generalstructure    # Type of structure
    id                    = structure01         # Name of the structure
    polylinefile          = structure01.pli     # *.pli; Polyline geometry definition for 2D structure
    widthleftW1           =                     # Width left side of structure (m)
    widthleftWsdl         =                     # Width structure left side (m)
    widthcenter           =                     # Width structure centre (m)
    widthrightWsdr        =                     # Width structure right side (m)
    widthrightW2          =                     # Width right side of structure (m)
    levelleftZb1          = 0                   # Bed level left side of structure (m AD)
    levelleftZbsl         = 0                   # Bed level left side structure (m AD)
    levelcenter           = 0                   # Bed level at centre of structure (m AD)
    levelrightZbsr        = 0                   # Bed level right side structure (m AD)
    levelrightZb2         = 0                   # Bed level right side of structure (m AD)
    gateheight            = 0                   # Gate lower edge level (m AD)
    pos_freegateflowcoeff = 1                   # Positive free gate flow (-)
    pos_drowngateflowcoeff= 1                   # Positive drowned gate flow (-)
    pos_freeweirflowcoeff = 1                   # Positive free weir flow (-)
    pos_drownweirflowcoeff= 1                   # Positive drowned weir flow (-)
    pos_contrcoeffreegate = 1                   # Positive flow contraction coefficient (-)
    neg_freegateflowcoeff = 1                   # Negative free gate flow (-)
    neg_drowngateflowcoeff= 1                   # Negative drowned gate flow (-)
    neg_freeweirflowcoeff = 1                   # Negative free weir flow (-)
    neg_drownweirflowcoeff= 1                   # Negative drowned weir flow (-)
    neg_contrcoeffreegate = 1                   # Negative flow contraction coefficient (-)
    extraresistance       = 0                   # Extra resistance (-)
    gatedoorheight        = 0                   # Vertical gate door height (m)
    door_opening_width    = 0                   # Horizontal opening width between the doors (m)
    horizontal_opening_direction= symmetric           # Horizontal direction of the opening doors
