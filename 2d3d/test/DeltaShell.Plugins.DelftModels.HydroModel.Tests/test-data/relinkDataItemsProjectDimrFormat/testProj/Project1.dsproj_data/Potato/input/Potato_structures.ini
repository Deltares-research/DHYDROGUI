[structure]
    type                  = generalstructure    	# Type of structure
    id                    = structure01         	# Name of the structure
    polylinefile          = structure01.pli     	# *.pli; Polyline geometry definition for 2D structure
    Upstream1Width        =                     	# Upstream width 1 (m)
    Upstream2Width        =                     	# Upstream width 2 (m)
    CrestWidth            =                     	# Crest width (m)
    Downstream1Width      =                     	# Downstream width 1 (m)
    Downstream2Width      =                     	# Downstream width 2 (m)
    Upstream1Level        = 0                   	# Upstream level 1 (m AD)
    Upstream2Level        = 0                   	# Upstream level 2 (m AD)
    CrestLevel            = 0                   	# Crest level (m AD)
    Downstream1Level      = 0                   	# Downstream level 1 (m AD)
    Downstream2Level      = 0                   	# Downstream level 2 (m AD)
    GateLowerEdgeLevel    = 0                   	# Gate lower edge level (m AD)
    pos_freegateflowcoeff = 1                   	# Positive free gate flow (-)
    pos_drowngateflowcoeff= 1                   	# Positive drowned gate flow (-)
    pos_freeweirflowcoeff = 1                   	# Positive free weir flow (-)
    pos_drownweirflowcoeff= 1                   	# Positive drowned weir flow (-)
    pos_contrcoeffreegate = 1                   	# Positive flow contraction coefficient (-)
    neg_freegateflowcoeff = 1                   	# Negative free gate flow (-)
    neg_drowngateflowcoeff= 1                   	# Negative drowned gate flow (-)
    neg_freeweirflowcoeff = 1                   	# Negative free weir flow (-)
    neg_drownweirflowcoeff= 1                   	# Negative drowned weir flow (-)
    neg_contrcoeffreegate = 1                   	# Negative flow contraction coefficient (-)
    extraresistance       = 0                   	# Extra resistance (-)
    GateHeight            = 0                   	# Vertical gate door height (m)
    GateOpeningWidth      = 0                   	# Horizontal opening width between the gates (m)
    GateOpeningHorizontalDirection= symmetric           	# Horizontal direction of the opening gates
