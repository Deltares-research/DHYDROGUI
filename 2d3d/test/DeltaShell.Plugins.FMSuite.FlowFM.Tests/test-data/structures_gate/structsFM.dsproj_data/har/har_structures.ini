[structure]
    type                  = pump                # Type of structure
    id                    = pump01              # Name of the structure
    polylinefile          = pump01.pli          # *.pli; Polyline geometry definition for 2D structure
    capacity              = pump01_capacity.tim # Pump capacity in [m^3/s]
    start_level_delivery_side= 0                   # Water level(s) at which the pump starts suction at the delivery side of the pump
    stop_level_delivery_side= 0                   # Water level(s) at which the pump stops suction at the delivery side of the pump
    start_level_suction_side= 3                   # Water level(s) at which the pump starts suction at the suction side of the pump
    stop_level_suction_side= 2                   # Water level(s) at which the pump stops suction at the suction side of the pump
    reduction_factor_no_levels= 0                   # When 0 it's regarded as a constant factor of 1. When 1 a specified constant is used. For more than 1 a table is referenced.
[structure]
    type                  = weir                # Type of structure
    id                    = weir02              # Name of the structure
    polylinefile          = weir02.pli          # *.pli; Polyline geometry definition for 2D structure
    crest_level           = weir02_crest_level.tim# Crest height in [m]
    lat_contr_coeff       = 1                   # Lateral contraction coefficient in [?TODO?]
[structure]
    type                  = gate                # Type of structure
    id                    = gate01              # Name of the structure
    polylinefile          = gate01.pli          # *.pli; Polyline geometry definition for 2D structure
    lower_edge_level      = -5                  # Lower edge level of the gate
    opening_width         = gate01_opening_width.tim# Opening width of the gate
    sill_level            = -7                  # Sill level in [m]
    door_height           = 5                   # TODO
    horizontal_opening_direction= symmetric           # Horizontal direction of the opening doors
